<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikipedia AI Pathfinder</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #ffffff;
            --accent: #bb86fc;
            --bfs-color: #03dac6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 5px; color: var(--accent); }
        .controls {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        input[type="text"], button {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #333;
            background: #2c2c2c;
            color: white;
            font-size: 16px;
            width: 200px;
        }
        input[type="text"]::placeholder { color: #888; }
        
        button {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: auto;
        }
        button:hover { background: #9b68eb; }
        
        .comparison-wrapper {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1600px; 
            height: 70vh; 
        }
        .panel {
            flex: 1;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }
        .panel h3 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .ai-title { color: var(--accent); }
        .bfs-title { color: var(--bfs-color); }
        
        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: #2a2a2a;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 14px;
            border: 1px solid #444;
        }
        .stats-val { color: #fff; font-weight: bold; }

        .network-graph {
            height: 450px; 
            width: 100%;
            background-color: #0f0f0f;
            border-radius: 10px;
            margin-top: 15px;
            border: 1px solid #333;
        }
        .loading { font-style: italic; color: #888; }
        .path-text { margin: 0; font-size: 14px; color: #ccc; }
    </style>
</head>
<body>

    <h1>Wikipedia Graph Navigator</h1>
    <p>Compare Shortest Path against AI Neural Network predictions.</p>

   <div class="controls">
        <div>
            <label>Start Node: </label>
            <input type="text" id="startNode" list="nodeList" placeholder="Search for start...">
        </div>
        <div>
            <label>Target Node: </label>
            <input type="text" id="targetNode" list="nodeList" placeholder="Search for target...">
        </div>
        
        <datalist id="nodeList">
            {% for node in nodes %}
                <option value="{{ node }}">
            {% endfor %}
        </datalist>

        <button onclick="pickRandom()" style="background: var(--bfs-color);">🎲 Random Route</button>
        <button onclick="calculatePaths()">Find Path</button>
        <button onclick="window.location.href='/play'" style="background: #ffeb3b; color: #000; margin-left: auto;">🎮 Play vs the AI</button>
    </div>
    <div class="comparison-wrapper">
        <div class="panel">
            <h3 class="ai-title">AI Predicted Path</h3>
            <div class="stats-bar">
                <span>⏱️ Time: <span class="stats-val" id="aiTime">0.000</span>s</span>
                <span>🔍 Nodes Explored: <span class="stats-val" id="aiExplored">0</span></span>
            </div>
            <p class="path-text" id="aiOutput">Waiting for input...</p>
            <div id="ai-graph" class="network-graph"></div>
        </div>
        
        <div class="panel">
            <h3 class="bfs-title">Shortest Path (BFS)</h3>
            <div class="stats-bar">
                <span>⏱️ Time: <span class="stats-val" id="bfsTime">0.000</span>s</span>
                <span>🔍 Nodes Explored: <span class="stats-val" id="bfsExplored">0</span></span>
            </div>
            <p class="path-text" id="bfsOutput">Waiting for input...</p>
            <div id="bfs-graph" class="network-graph"></div>
        </div>
    </div>

    <script id="node-data" type="application/json">
        {{ nodes | tojson | safe }}
    </script>

    <script>
        let aiNetwork = null;
        let bfsNetwork = null;
        
        const allNodes = JSON.parse(document.getElementById('node-data').textContent);

        function pickRandom() {
            if (allNodes.length < 2) return; 
            let startIdx = Math.floor(Math.random() * allNodes.length);
            let targetIdx = Math.floor(Math.random() * allNodes.length);
            while (startIdx === targetIdx) targetIdx = Math.floor(Math.random() * allNodes.length);

            document.getElementById('startNode').value = allNodes[startIdx];
            document.getElementById('targetNode').value = allNodes[targetIdx];
            calculatePaths();
        }

        async function calculatePaths() {
            const start = document.getElementById('startNode').value;
            const target = document.getElementById('targetNode').value;
            
            if (!start || !target) return alert("Please select both a Start Node and a Target Node.");
            
            document.getElementById('aiOutput').innerHTML = "<span class='loading'>Calculating...</span>";
            document.getElementById('bfsOutput').innerHTML = "<span class='loading'>Calculating...</span>";

            try {
                const response = await fetch('/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ start, target })
                });
                
                const data = await response.json();
                
                // UPDATED: Populate the new stats DOM elements!
                document.getElementById('aiTime').innerText = data.ai_time.toFixed(4);
                document.getElementById('aiExplored').innerText = data.ai_explored;
                document.getElementById('bfsTime').innerText = data.bfs_time.toFixed(4);
                document.getElementById('bfsExplored').innerText = data.bfs_explored;

                document.getElementById('aiOutput').innerText = data.ai_path.join(" ➔ ");
                document.getElementById('bfsOutput').innerText = data.bfs_path.length ? data.bfs_path.join(" ➔ ") : "No path found.";

                drawGraphs(data.ai_path, data.bfs_path, start, target);
            } catch (error) {
                console.error("Error fetching path:", error);
                document.getElementById('aiOutput').innerText = "Error calculating path.";
                document.getElementById('bfsOutput').innerText = "Error calculating path.";
            }
        }

        function drawGraphs(aiPath, bfsPath, startNode, targetNode) {
            // UPDATED OPTIONS: Fast-track stabilization and BarnesHut physics solver
            const options = {
                physics: { 
                    enabled: true,
                    stabilization: {
                        enabled: true,
                        iterations: 1000, 
                        updateInterval: 50 
                    },
                    solver: 'barnesHut',
                    barnesHut: {
                        gravitationalConstant: -2000,
                        centralGravity: 0.3,
                        springLength: 95
                    }
                },
                edges: { smooth: { type: 'continuous' } },
                interaction: { dragNodes: true, zoomView: true, dragView: true }
            };

            function createNodeObj(id, color, isStart, isTarget) {
                let shape = 'dot'; 
                let size = 15;
                let finalColor = color;

                if (isStart) { shape = 'star'; size = 25; finalColor = '#ffeb3b'; } 
                else if (isTarget) { shape = 'star'; size = 25; finalColor = '#ff5722'; } 

                return {
                    id: id,
                    label: id, 
                    shape: shape,
                    size: size,
                    color: { background: finalColor, border: '#ffffff' },
                    // UPDATED FONT: Thicker stroke and larger text for zoomed-out readability
                    font: { 
                        color: '#ffffff', 
                        size: 18, 
                        strokeWidth: 5, 
                        strokeColor: '#000000' 
                    }
                };
            }

            const aiNodes = new vis.DataSet();
            const aiEdges = new vis.DataSet();

            for (let i = 0; i < aiPath.length; i++) {
                if (aiPath[i] === "(Failed to reach target)") continue;
                
                let isStart = (aiPath[i] === startNode);
                let isTarget = (aiPath[i] === targetNode);

                if (!aiNodes.get(aiPath[i])) {
                    aiNodes.add(createNodeObj(aiPath[i], '#bb86fc', isStart, isTarget));
                }
                
                if (i > 0) {
                    aiEdges.add({ from: aiPath[i-1], to: aiPath[i], color: {color: '#bb86fc'}, arrows: 'to' });
                }
            }

            const bfsNodes = new vis.DataSet();
            const bfsEdges = new vis.DataSet();

            for (let i = 0; i < bfsPath.length; i++) {
                let isStart = (bfsPath[i] === startNode);
                let isTarget = (bfsPath[i] === targetNode);

                if (!bfsNodes.get(bfsPath[i])) {
                    bfsNodes.add(createNodeObj(bfsPath[i], '#03dac6', isStart, isTarget));
                }
                
                if (i > 0) {
                    bfsEdges.add({ from: bfsPath[i-1], to: bfsPath[i], color: {color: '#03dac6'}, arrows: 'to' });
                }
            }

            if (aiNetwork !== null) aiNetwork.destroy();
            if (bfsNetwork !== null) bfsNetwork.destroy();

            aiNetwork = new vis.Network(document.getElementById('ai-graph'), { nodes: aiNodes, edges: aiEdges }, options);
            bfsNetwork = new vis.Network(document.getElementById('bfs-graph'), { nodes: bfsNodes, edges: bfsEdges }, options);

            // AUTO-FIT: Triggers a smooth zoom to fit all nodes once physics settle
            aiNetwork.once('stabilized', function() {
                aiNetwork.fit({ animation: true }); 
            });

            bfsNetwork.once('stabilized', function() {
                bfsNetwork.fit({ animation: true }); 
            });
        }
    </script>
</body>
</html>
